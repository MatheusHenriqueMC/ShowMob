<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOBSHOW</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #06060f;
  --bg2: #0d0d1a;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --text: #e8e8f0;
  --text2: rgba(255,255,255,0.45);
  --accent: #FF4500;
  --accent2: #FF8C00;
  --danger: #ff3355;
  --gold: #FFD700;
  --green: #00cc66;
}
body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; }

/* ── Shared ── */
.app { max-width:640px; margin:0 auto; padding-bottom:40px; }
.logo { font-family:'Orbitron',monospace; font-size:28px; font-weight:900; letter-spacing:4px; }
.logo span:first-child { color:var(--accent); }
.logo span:last-child  { color:var(--accent2); }
.field-label { font-size:11px; font-weight:700; letter-spacing:3px; color:var(--accent2); margin-bottom:6px; display:block; }
.text-input {
  width:100%; padding:12px 16px; border:1px solid var(--border);
  border-radius:10px; background:var(--surface2); color:var(--text);
  font-family:'Rajdhani'; font-size:16px; font-weight:600; outline:none; letter-spacing:1px;
}
.text-input::placeholder { color:var(--text2); }
.text-input:focus { border-color:var(--accent2); }
.btn {
  padding:12px 24px; border:none; border-radius:10px;
  font-family:'Rajdhani'; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:1px;
  transition:all 0.2s;
}
.btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
.btn-primary:hover { opacity:0.88; }
.btn-outline { background:transparent; border:2px solid var(--accent); color:var(--accent); }
.btn-outline:hover { background:var(--accent); color:#fff; }
.btn-ghost { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text2); }
.btn-ghost:hover { background:rgba(255,255,255,0.1); color:var(--text); }
.btn-danger { background:rgba(255,50,50,0.08); border:1px solid rgba(255,50,50,0.3); color:var(--danger); }
.btn-danger:hover { background:rgba(255,50,50,0.22); }
.btn-green { background:rgba(0,204,102,0.12); border:1px solid rgba(0,204,102,0.4); color:var(--green); }
.btn-green:hover { background:rgba(0,204,102,0.25); }
.error-msg { color:var(--danger); font-size:13px; font-weight:700; letter-spacing:1px; margin-top:8px; }
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:20px;
}

/* ── Login Screen ── */
.login-screen {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:24px;
}
.login-box { width:100%; max-width:360px; }
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo .logo { font-size:36px; }
.login-logo p { color:var(--text2); font-size:13px; margin-top:8px; letter-spacing:2px; }
.login-form { display:flex; flex-direction:column; gap:16px; }
.login-field { display:flex; flex-direction:column; }
.login-field .text-input { margin-top:0; }

/* ── Lobby Screen ── */
.lobby-screen { padding:24px 20px; }
.lobby-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
.user-card {
  display:flex; align-items:center; gap:14px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:16px 18px; margin-bottom:24px;
  cursor:pointer; transition:border-color 0.2s;
}
.user-card:hover { border-color:rgba(255,140,0,0.4); }
.user-card-info { flex:1; min-width:0; }
.user-card-name { font-size:18px; font-weight:700; letter-spacing:1px; }
.user-card-sub { font-size:12px; color:var(--text2); letter-spacing:1px; margin-top:2px; }
.user-card-edit { font-size:11px; color:var(--accent2); letter-spacing:2px; font-weight:700; }
.lobby-section { margin-bottom:20px; }
.lobby-section-title {
  font-size:11px; font-weight:700; letter-spacing:3px; color:var(--text2);
  margin-bottom:12px;
}
.room-action-row { display:flex; gap:10px; }
.room-action-row .text-input { flex:1; }

/* ── Game Screen ── */
.game-header {
  position:sticky; top:0; z-index:100;
  background:linear-gradient(180deg,var(--bg) 85%,transparent);
  padding:14px 20px 10px;
}
.game-header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.room-info { display:flex; flex-direction:column; }
.room-name { font-family:'Orbitron'; font-size:16px; font-weight:700; color:var(--accent2); letter-spacing:2px; }
.room-code-badge {
  font-size:11px; font-weight:700; color:var(--text2); letter-spacing:3px;
  background:var(--surface2); border:1px solid var(--border);
  padding:3px 10px; border-radius:20px; display:inline-block; margin-top:3px;
  cursor:pointer; transition:color 0.2s;
}
.room-code-badge:hover { color:var(--accent2); }
.header-actions { display:flex; gap:8px; align-items:center; }
.round-count {
  font-size:12px; font-weight:700; color:var(--accent2);
  background:rgba(255,69,0,0.12); border:1px solid rgba(255,69,0,0.25);
  padding:5px 14px; border-radius:20px; letter-spacing:1px;
}
.tabs { display:flex; gap:4px; background:var(--surface); border-radius:12px; padding:4px; }
.tab {
  flex:1; padding:10px 0; border:none; border-radius:10px;
  background:transparent; color:var(--text2); font-family:'Rajdhani';
  font-size:14px; font-weight:700; cursor:pointer; letter-spacing:1.5px; transition:all 0.2s;
}
.tab.active { background:rgba(255,69,0,0.18); color:var(--accent2); }
.content { padding:16px 20px; }

/* ── Score Cards ── */
.current-round-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.current-round-title { font-family:'Orbitron'; font-size:16px; font-weight:700; color:var(--accent2); letter-spacing:2px; }
.round-controls { display:flex; gap:8px; align-items:center; }
.btn-new-round {
  padding:8px 20px; border:2px solid var(--accent); border-radius:10px;
  background:rgba(255,69,0,0.1); color:var(--accent); font-family:'Rajdhani';
  font-size:14px; font-weight:700; cursor:pointer; letter-spacing:1px; transition:all 0.2s;
}
.btn-new-round:hover { background:var(--accent); color:#fff; }
.round-title-row { margin-bottom:16px; }
.round-title-input {
  width:100%; padding:11px 16px; background:var(--surface2);
  border:1px solid rgba(255,140,0,0.35); border-radius:10px; color:var(--text);
  font-family:'Orbitron'; font-size:13px; font-weight:700; letter-spacing:2px; outline:none;
}
.round-title-input::placeholder { color:rgba(255,255,255,0.35); font-family:'Rajdhani'; font-size:14px; letter-spacing:1px; font-weight:500; }
.round-title-input:focus { border-color:var(--accent2); }
.score-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
.score-card {
  border:2px solid; border-radius:16px; padding:14px 12px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  cursor:pointer; transition:all 0.15s; user-select:none;
  -webkit-tap-highlight-color:transparent; position:relative;
}
.score-card:active { transform:scale(0.95); }
.score-card-avatar {
  width:60px; height:60px; border-radius:50%; overflow:hidden;
  border:2px solid; display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron'; font-weight:700; font-size:18px; flex-shrink:0; margin-bottom:2px;
}
.score-card-avatar img { width:100%; height:100%; object-fit:cover; }
.score-card-name { font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; text-align:center; }
.score-card-points { font-family:'Orbitron'; font-size:38px; font-weight:900; line-height:1; transition:all 0.15s; }
.score-card-hint { font-size:10px; color:var(--text2); letter-spacing:1px; }
.score-card-minus {
  position:absolute; top:6px; right:8px; width:24px; height:24px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06);
  color:var(--text2); font-size:16px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; line-height:1;
}
.score-card-minus:hover { background:rgba(255,50,50,0.2); color:var(--danger); }
.btn-finalizar {
  width:100%; padding:14px; margin-top:16px; margin-bottom:4px;
  border:2px solid var(--gold); border-radius:12px; background:rgba(255,215,0,0.08);
  color:var(--gold); font-family:'Orbitron'; font-size:14px; font-weight:700;
  cursor:pointer; letter-spacing:2px; transition:all 0.25s;
  text-shadow:0 0 12px rgba(255,215,0,0.4);
}
.btn-finalizar:hover { background:rgba(255,215,0,0.18); box-shadow:0 0 24px rgba(255,215,0,0.25); }
.no-round { text-align:center; padding:60px 20px; color:var(--text2); }
.no-round-icon { font-size:48px; margin-bottom:12px; }
.no-round-text { font-size:18px; font-weight:700; margin-bottom:8px; }

/* ── Totals ── */
.totals-section { background:var(--surface); border-radius:16px; padding:20px; border:1px solid var(--border); margin-top:8px; }
.totals-title { font-size:12px; font-weight:700; letter-spacing:3px; color:var(--text2); text-align:center; margin-bottom:16px; }
.total-row { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
.total-info { display:flex; align-items:center; gap:8px; }
.total-avatar {
  width:28px; height:28px; border-radius:50%; overflow:hidden;
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron'; font-size:9px; font-weight:700; border:2px solid;
}
.total-avatar img { width:100%; height:100%; object-fit:cover; }
.total-name { flex:1; font-size:14px; font-weight:700; color:rgba(255,255,255,0.7); }
.total-value { font-family:'Orbitron'; font-size:20px; font-weight:900; }
.bar-track { height:5px; background:rgba(255,255,255,0.07); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width 0.4s ease; }

/* ── History ── */
.history-summary {
  display:flex; justify-content:space-around; flex-wrap:wrap; gap:8px;
  background:var(--surface); border-radius:14px; padding:14px 8px;
  margin-bottom:20px; border:1px solid var(--border);
}
.summary-item { display:flex; flex-direction:column; align-items:center; gap:3px; }
.summary-avatar {
  width:28px; height:28px; border-radius:50%; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron'; font-size:8px; font-weight:700; border:2px solid;
}
.summary-avatar img { width:100%; height:100%; object-fit:cover; }
.summary-name { font-size:10px; font-weight:700; letter-spacing:1px; color:var(--text2); }
.summary-value { font-family:'Orbitron'; font-size:20px; font-weight:900; }
.rounds-list { display:flex; flex-direction:column; gap:10px; }
.round-card { position:relative; background:var(--surface); border-radius:14px; padding:14px 16px; border:1px solid var(--border); }
.round-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.round-card-number { font-family:'Orbitron'; font-size:13px; font-weight:700; color:var(--accent2); }
.round-card-time { font-size:11px; color:var(--text2); }
.round-card-title { font-family:'Orbitron'; font-size:12px; font-weight:700; color:var(--accent2); letter-spacing:2px; margin-bottom:10px; padding:0 0 8px; border-bottom:1px solid rgba(255,140,0,0.15); }
.round-card-scores { display:flex; gap:6px; flex-wrap:wrap; }
.round-chip {
  flex:1; min-width:65px; display:flex; flex-direction:column;
  align-items:center; padding:8px 6px; border-radius:10px;
  border:1px solid transparent; gap:4px; position:relative;
}
.chip-crown { position:absolute; top:-11px; left:50%; transform:translateX(-50%); font-size:15px; line-height:1; filter:drop-shadow(0 0 4px rgba(255,215,0,0.7)); pointer-events:none; }
.chip-avatar { width:22px; height:22px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; font-family:'Orbitron'; font-size:7px; font-weight:700; border:1px solid; }
.chip-avatar img { width:100%; height:100%; object-fit:cover; }
.chip-name { font-size:9px; font-weight:700; letter-spacing:1px; }
.chip-value { font-family:'Orbitron'; font-size:16px; font-weight:900; }
.btn-delete-round {
  position:absolute; top:10px; right:12px; width:22px; height:22px; border-radius:50%;
  border:none; background:rgba(255,255,255,0.06); color:var(--text2); font-size:11px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.btn-delete-round:hover { background:rgba(255,50,50,0.2); color:var(--danger); }
.btn-clear { width:100%; padding:14px; margin-top:20px; border:1px solid rgba(255,50,50,0.3); border-radius:12px; background:rgba(255,50,50,0.06); color:var(--danger); font-family:'Rajdhani'; font-size:14px; font-weight:700; letter-spacing:2px; cursor:pointer; }
.empty { text-align:center; padding:60px 20px; color:var(--text2); }
.empty-icon { font-size:48px; margin-bottom:12px; }

/* ── Members list ── */
.members-section { margin-bottom:20px; }
.members-title { font-size:11px; font-weight:700; letter-spacing:3px; color:var(--text2); margin-bottom:10px; }
.members-row { display:flex; gap:10px; flex-wrap:wrap; }
.member-chip { display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:5px 12px 5px 6px; }
.member-chip-name { font-size:13px; font-weight:700; }

/* ── Profile Modal ── */
.modal-overlay {
  position:fixed; inset:0; z-index:400; background:rgba(0,0,0,0.8);
  backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:16px;
}
.modal-overlay.hidden { display:none; }
.modal-box {
  width:100%; max-width:400px; background:linear-gradient(160deg,#0f0f22,#14142a);
  border:1px solid rgba(255,140,0,0.25); border-radius:20px; overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
}
.modal-header {
  padding:20px 24px 16px; border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
}
.modal-title { font-family:'Orbitron'; font-size:14px; font-weight:700; letter-spacing:2px; color:var(--accent2); }
.modal-close { width:28px; height:28px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:16px; }
.modal-footer { padding:16px 24px 20px; display:flex; gap:10px; }
.avatar-upload-row { display:flex; align-items:center; gap:14px; }
.avatar-big {
  width:72px; height:72px; border-radius:50%; overflow:hidden; flex-shrink:0;
  border:2px solid var(--accent2); display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron'; font-size:22px; font-weight:700; position:relative; cursor:pointer;
}
.avatar-big img { width:100%; height:100%; object-fit:cover; }
.avatar-big input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.avatar-upload-hint { font-size:12px; color:var(--text2); }
.color-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.color-swatch {
  width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent;
  transition:transform 0.15s, border-color 0.15s; flex-shrink:0;
}
.color-swatch.selected { border-color:#fff; transform:scale(1.2); }
.color-input-wrap { position:relative; width:28px; height:28px; }
.color-input-wrap input[type=color] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; border:none; }
.color-input-wrap .color-swatch { background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red); }

/* ── Admin Modal ── */
.admin-user-list { display:flex; flex-direction:column; gap:8px; max-height:300px; overflow-y:auto; }
.admin-user-item { display:flex; align-items:center; gap:10px; background:var(--surface2); border-radius:10px; padding:10px 14px; border:1px solid var(--border); }
.admin-user-name { flex:1; font-size:15px; font-weight:700; }
.admin-user-role { font-size:11px; color:var(--accent2); font-weight:700; letter-spacing:2px; }
.admin-user-actions { display:flex; gap:6px; }
.btn-icon { width:28px; height:28px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.btn-icon:hover { color:var(--text); }
.btn-icon.danger:hover { background:rgba(255,50,50,0.2); color:var(--danger); border-color:rgba(255,50,50,0.3); }
.admin-create-form { display:flex; flex-direction:column; gap:10px; padding-top:12px; border-top:1px solid var(--border); }
.admin-form-row { display:flex; gap:8px; }
.admin-form-row .text-input { flex:1; font-size:14px; padding:10px 14px; }
.role-select {
  padding:10px 14px; border:1px solid var(--border); border-radius:10px;
  background:var(--surface2); color:var(--text); font-family:'Rajdhani'; font-size:14px; font-weight:600;
  outline:none; cursor:pointer;
}

/* ── Winner Popup ── */
.winner-overlay {
  position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.88);
  backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center;
  padding:16px; overflow-y:auto;
}
.winner-overlay.hidden { display:none; }
#confettiCanvas { position:fixed; inset:0; z-index:501; pointer-events:none; width:100%; height:100%; }
.popup-box {
  position:relative; z-index:502; width:100%; max-width:440px;
  background:linear-gradient(160deg,#0f0f22,#14142a);
  border:1px solid rgba(255,215,0,0.25); border-radius:24px; overflow:hidden;
  box-shadow:0 0 60px rgba(255,215,0,0.1),0 24px 80px rgba(0,0,0,0.6);
}
.popup-glow { position:absolute; top:-60px; left:50%; transform:translateX(-50%); width:280px; height:280px; background:radial-gradient(circle,rgba(255,215,0,0.12) 0%,transparent 70%); pointer-events:none; }
.popup-header { padding:32px 24px 24px; display:flex; flex-direction:column; align-items:center; gap:12px; text-align:center; }
.winner-crown { font-size:36px; animation:crownBounce 0.8s ease infinite alternate; }
@keyframes crownBounce { from{transform:translateY(0) rotate(-5deg)} to{transform:translateY(-6px) rotate(5deg)} }
.winner-label { font-family:'Orbitron'; font-size:11px; letter-spacing:4px; color:var(--gold); opacity:0.8; }
.winner-avatar-large {
  width:100px; height:100px; border-radius:50%; overflow:hidden; border:3px solid var(--gold);
  box-shadow:0 0 30px rgba(255,215,0,0.4); display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron'; font-size:32px; font-weight:900;
  animation:avatarPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; animation-delay:0.2s;
}
@keyframes avatarPop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.winner-avatar-large img { width:100%; height:100%; object-fit:cover; }
.winner-name { font-family:'Orbitron'; font-size:26px; font-weight:900; letter-spacing:3px; animation:fadeUp 0.5s ease both; animation-delay:0.4s; }
@keyframes fadeUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
.winner-round-score { font-size:14px; color:var(--text2); letter-spacing:1px; animation:fadeUp 0.5s ease both; animation-delay:0.5s; }
.winner-round-score span { font-family:'Orbitron'; font-size:22px; font-weight:900; color:var(--gold); }
.popup-ranking { padding:0 20px 24px; }
.ranking-title { font-family:'Orbitron'; font-size:11px; letter-spacing:4px; color:var(--text2); text-align:center; margin-bottom:14px; }
.ranking-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:12px; margin-bottom:8px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); opacity:0; animation:slideInRight 0.45s cubic-bezier(0.34,1.2,0.64,1) forwards; }
@keyframes slideInRight { from{transform:translateX(60px);opacity:0} to{transform:translateX(0);opacity:1} }
.ranking-item.rank-1 { background:rgba(255,215,0,0.08); border-color:rgba(255,215,0,0.3); }
.ranking-item.rank-2 { background:rgba(192,192,192,0.06); border-color:rgba(192,192,192,0.2); }
.ranking-item.rank-3 { background:rgba(205,127,50,0.06); border-color:rgba(205,127,50,0.2); }
.rank-pos { font-family:'Orbitron'; font-size:16px; font-weight:900; width:28px; text-align:center; flex-shrink:0; }
.rank-pos.p1{color:var(--gold)} .rank-pos.p2{color:#C0C0C0} .rank-pos.p3{color:#CD7F32} .rank-pos.other{color:var(--text2);font-size:12px}
.rank-avatar { width:38px; height:38px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; font-family:'Orbitron'; font-size:12px; font-weight:700; border:2px solid; flex-shrink:0; }
.rank-avatar img { width:100%; height:100%; object-fit:cover; }
.rank-info { flex:1; min-width:0; }
.rank-name { font-size:14px; font-weight:700; letter-spacing:1px; }

.rank-bar-fill { height:100%; border-radius:2px; }
.rank-score { font-family:'Orbitron'; font-size:22px; font-weight:900; flex-shrink:0; }
.btn-close-popup { display:block; width:calc(100% - 40px); margin:0 20px 20px; padding:14px; border:1px solid rgba(255,255,255,0.15); border-radius:12px; background:rgba(255,255,255,0.04); color:var(--text2); font-family:'Orbitron'; font-size:13px; font-weight:700; letter-spacing:2px; cursor:pointer; }
.btn-close-popup:hover { background:rgba(255,255,255,0.09); color:var(--text); }

.pop { animation:pop 0.2s ease; }

/* ── Video ── */
.video-section { margin-bottom:16px; background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.video-section-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px 8px; }
.video-url-row { display:flex; gap:8px; padding:0 12px 12px; }
.video-wrapper { position:relative; padding-bottom:56.25%; height:0; background:#000; border-radius:0 0 14px 14px; overflow:hidden; }
.video-wrapper > div { position:absolute; top:0; left:0; width:100%; height:100%; }
.video-wrapper iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
.video-overlay { position:absolute; inset:0; z-index:5; cursor:default; }

/* ── Timer ── */
.timer-section { margin-bottom: 16px; }
.timer-config { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid rgba(0,204,102,0.2); border-radius:12px; padding:12px 16px; }
.timer-duration-input { width:56px; padding:7px 10px; border:1px solid rgba(255,140,0,0.35); border-radius:8px; background:var(--surface2); color:var(--text); font-family:'Orbitron'; font-size:16px; font-weight:700; text-align:center; outline:none; -moz-appearance:textfield; }
.timer-duration-input::-webkit-outer-spin-button,.timer-duration-input::-webkit-inner-spin-button { -webkit-appearance:none; }
.btn-start-timer { padding:8px 18px; border:2px solid var(--green); border-radius:10px; background:rgba(0,204,102,0.1); color:var(--green); font-family:'Rajdhani'; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:1px; transition:all 0.2s; white-space:nowrap; }
.btn-start-timer:hover { background:rgba(0,204,102,0.25); }
.timer-active { background:var(--surface); border:1px solid rgba(255,140,0,0.3); border-radius:14px; padding:16px; }
.timer-countdown { font-family:'Orbitron'; font-size:52px; font-weight:900; color:var(--accent2); text-align:center; line-height:1; margin-bottom:8px; text-shadow:0 0 20px rgba(255,140,0,0.4); }
.timer-countdown.timer-urgent { color:var(--danger); animation:urgentPulse 0.4s ease infinite alternate; text-shadow:0 0 20px rgba(255,51,85,0.6); }
@keyframes urgentPulse { from{opacity:1;transform:scale(1)} to{opacity:0.7;transform:scale(1.05)} }
.timer-bar-track { height:4px; background:rgba(255,255,255,0.07); border-radius:2px; margin-bottom:12px; overflow:hidden; }
.timer-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition:width 0.1s linear; }
.timer-answer-input { border-color:rgba(255,140,0,0.35) !important; font-size:16px !important; }
.timer-answer-input:focus { border-color:var(--accent2) !important; }
.card-indicator { font-size:10px; font-weight:700; letter-spacing:0.5px; padding:3px 7px; border-radius:8px; max-width:130px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:3px; display:flex; align-items:center; justify-content:center; gap:3px; }
.card-typing { color:var(--accent2); background:rgba(255,140,0,0.1); border:1px solid rgba(255,140,0,0.2); }
.card-answer-display { color:var(--text); background:rgba(255,255,255,0.07); border:1px solid var(--border); white-space:normal; word-break:break-word; line-height:1.3; max-width:130px; }

/* round selector */
.round-select {
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  font-family:'Orbitron'; font-size:12px; padding:6px 10px; border-radius:8px;
  cursor:pointer; outline:none;
}
</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<!-- Winner Popup -->
<div id="winnerOverlay" class="winner-overlay hidden" onclick="handleOverlayClick(event)">
  <div class="popup-box" id="popupBox">
    <div class="popup-glow"></div>
    <div class="popup-header">
      <div class="winner-crown">👑</div>
      <div class="winner-label">VENCEDOR DA RODADA</div>
      <div class="winner-avatar-large" id="winnerAvatar"></div>
      <div class="winner-name" id="winnerName"></div>
      <div class="winner-round-score" id="winnerScore"></div>
    </div>
    <div class="popup-ranking">
      <div class="ranking-title">RANKING DA RODADA</div>
      <div id="rankingList"></div>
    </div>
    <button class="btn-close-popup" onclick="closePopup()">FECHAR</button>
  </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">MEU PERFIL</span>
      <button class="modal-close" onclick="closeProfileModal()">✕</button>
    </div>
    <div class="modal-body" id="profileModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" style="flex:1" onclick="saveProfile()">SALVAR</button>
      <button class="btn btn-ghost" onclick="closeProfileModal()">CANCELAR</button>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div id="adminModal" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:500px">
    <div class="modal-header">
      <span class="modal-title">GERENCIAR USUÁRIOS</span>
      <button class="modal-close" onclick="closeAdminModal()">✕</button>
    </div>
    <div class="modal-body" id="adminModalBody"></div>
  </div>
</div>

<div id="app"></div>

<script>
// ── State ──
const COLORS = ['#00BFFF','#FF4500','#FFD700','#7CFC00','#FF69B4','#DA70D6','#00FFD0','#FF8C00','#FF1493','#1E90FF','#ADFF2F','#FF6347'];

const state = {
  screen: 'login',
  user: null,
  token: null,
  room: null,
  tab: 'placar',
  rounds: [],
  totals: [],
  currentRound: null,
  // profile edit
  editName: '',
  editAvatar: null,
  editColor: '',
  // admin
  adminUsers: [],
  adminNewUser: '',
  adminNewPass: '',
  adminNewRole: 'user',
  adminResetId: null,
  adminResetPass: '',
  // lobby
  joinCode: '',
  roomName: '',
  // video
  ytPlayer: null,
  currentVideoId: null,
  currentVideoRoundId: null,
  videoState: {},        // {round_id: {playing, position, position_at_ms}}
  _suppressVideoEvents: false,
  _videoSyncInterval: null,
  _videoPlaying: false,
  // timer
  timer: null,           // {session_id, duration, round_id, end_at_ms}
  timerInterval: null,
  timerDuration: 30,
  myAnswer: '',
  typingUsers: {},       // {String(user_id): bool}
  roundAnswers: {},      // {round_id: {String(user_id): text}} revealed after timer ends
  _isTyping: false,
  _typingStopTimer: null,
  answerSaveTimer: null,
  // misc
  titleSaveTimer: null,
  confettiFrame: null,
  socket: null,
  loginUser: '',
  loginPass: '',
  loginError: '',
};

// ── Persist session ──
function saveSession() {
  if (state.token) localStorage.setItem('ms_token', state.token);
  else localStorage.removeItem('ms_token');
  if (state.room) localStorage.setItem('ms_room', state.room.code);
  else localStorage.removeItem('ms_room');
}

function clearSession() {
  localStorage.removeItem('ms_token');
  localStorage.removeItem('ms_room');
}

// ── API ──
async function api(path, method = 'GET', body = null) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const opts = { method, headers };
  if (body !== null) opts.body = JSON.stringify(body);
  try {
    const res = await fetch('/api' + path, opts);
    if (res.status === 413) return { error: 'Arquivo muito grande. Use um GIF menor que 7MB.' };
    return res.json();
  } catch (e) {
    return { error: 'Erro ao comunicar com o servidor.' };
  }
}

// ── Socket.IO ──
function connectSocket() {
  if (state.socket) return;
  state.socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
  // Re-join the socket room after every reconnection (AWS drops idle connections)
  state.socket.on('connect', () => {
    if (state.room) joinSocketRoom(state.room.code);
  });
  state.socket.on('state_update', ({ rounds, totals }) => {
    state.rounds = rounds;
    state.totals = totals;
    if (state.currentRound) {
      state.currentRound = rounds.find(r => r.id === state.currentRound.id) || rounds[0] || null;
    } else {
      state.currentRound = rounds[0] || null;
    }
    if (state.screen === 'game') {
      if (state._videoPlaying) return; // Don't interrupt video playback for score updates
      render();
    }
  });
  state.socket.on('members_updated', ({ members }) => {
    if (state.room) state.room.members = members;
    if (state.screen === 'game') render();
  });

  state.socket.on('timer_started', ({ session_id, duration, started_at_ms, round_id }) => {
    state.myAnswer = '';
    state.typingUsers = {};
    delete state.roundAnswers[round_id];
    const end_at_ms = started_at_ms + duration * 1000;
    state.timer = { session_id, duration, round_id, end_at_ms };
    if (state.screen === 'game') {
      const r = state.rounds.find(x => x.id === round_id);
      const roundChanged = r && state.currentRound && r.id !== state.currentRound.id;
      if (r) state.currentRound = r;
      if (roundChanged) { render(); } else { refreshTimerArea(state.currentRound); }
      startTimerCountdown();
    }
  });

  state.socket.on('timer_ended', ({ session_id, round_id, answers }) => {
    if (!state.timer || state.timer.session_id !== session_id) return;
    const answerMap = {};
    answers.forEach(a => { answerMap[String(a.user_id)] = a.text; });
    state.roundAnswers[round_id] = answerMap;
    clearTimerCountdown();
    state.timer = null;
    state.myAnswer = '';
    state.typingUsers = {};
    state._isTyping = false;
    clearTimeout(state._typingStopTimer);
    if (state.screen === 'game') refreshTimerArea(state.currentRound);
  });

  state.socket.on('video_set', ({ round_id, video_id }) => {
    const r = state.rounds.find(x => x.id === round_id);
    if (r) r.video_id = video_id || null;
    if (state.currentRound && state.currentRound.id === round_id) state.currentRound.video_id = video_id || null;
    if (!video_id) { delete state.videoState[round_id]; state.currentVideoId = null; }
    if (state.screen === 'game' && state.currentRound && state.currentRound.id === round_id) {
      render();
      if (video_id) syncVideoPlayer(state.currentRound);
    }
  });

  state.socket.on('video_control', ({ round_id, action, position, server_ts }) => {
    state.videoState[round_id] = { playing: action !== 'pause', position, position_at_ms: server_ts };
    if (isLeader()) return; // leader already applied via their own player
    if (!state.ytPlayer || !state.currentRound || state.currentRound.id !== round_id) return;
    const drift = (Date.now() - server_ts) / 1000;
    const adj = Math.max(0, position + (action !== 'pause' ? drift : 0));
    state._suppressVideoEvents = true;
    state.ytPlayer.seekTo(adj, true);
    if (action !== 'pause') state.ytPlayer.playVideo(); else state.ytPlayer.pauseVideo();
    setTimeout(() => { state._suppressVideoEvents = false; }, 600);
  });

  state.socket.on('typing_update', ({ user_id, is_typing, session_id }) => {
    if (!state.timer || state.timer.session_id !== session_id) return;
    state.typingUsers[String(user_id)] = is_typing;
    // Targeted DOM update — no full re-render so the answer input keeps focus
    const el = document.getElementById('card-indicator-' + user_id);
    if (el) el.style.display = is_typing ? 'flex' : 'none';
  });
}

function joinSocketRoom(code) {
  if (state.socket) state.socket.emit('join_room', { code });
}

function leaveSocketRoom(code) {
  if (state.socket) state.socket.emit('leave_room', { code });
}

// ── Auth ──
async function tryLogin() {
  state.loginError = '';
  const res = await api('/auth/login', 'POST', { username: state.loginUser, password: state.loginPass });
  if (res.error) { state.loginError = res.error; render(); return; }
  state.token = res.token;
  state.user = res.user;
  saveSession();
  connectSocket();
  state.screen = 'lobby';
  render();
}

async function logout() {
  if (state.room) leaveSocketRoom(state.room.code);
  await api('/auth/logout', 'POST');
  state.token = null;
  state.user = null;
  state.room = null;
  state.rounds = [];
  state.totals = [];
  state.currentRound = null;
  state.screen = 'login';
  state.loginUser = '';
  state.loginPass = '';
  clearSession();
  render();
}

// ── Room ──
async function createRoom() {
  const name = state.roomName.trim() || 'Sala sem nome';
  const res = await api('/rooms', 'POST', { name });
  if (res.error) { alert(res.error); return; }
  state.room = res;
  state.room.members = [];
  state.rounds = [];
  state.totals = [];
  state.currentRound = null;
  state.tab = 'placar';
  saveSession();
  joinSocketRoom(res.code);
  state.screen = 'game';
  render();
}

async function joinRoom() {
  const code = state.joinCode.trim().toUpperCase();
  if (!code) return;
  const res = await api('/rooms/join', 'POST', { code });
  if (res.error) { alert(res.error); return; }
  state.room = res;
  const roomData = await api('/rooms/' + res.code);
  state.room = roomData;
  state.rounds = await api('/rooms/' + res.code + '/rounds');
  state.totals = await api('/rooms/' + res.code + '/totals');
  state.currentRound = state.rounds[0] || null;
  state.videoState = {};
  state.rounds.forEach(r => { if (r.video_state) state.videoState[r.id] = r.video_state; });
  const timerInfo = await api('/rooms/' + res.code + '/timer');
  if (timerInfo && timerInfo.active) applyTimerState(timerInfo);
  state.tab = 'placar';
  saveSession();
  joinSocketRoom(res.code);
  state.screen = 'game';
  render();
  if (state.timer) startTimerCountdown();
}

async function leaveRoom() {
  if (!confirm('Sair da sala?')) return;
  leaveSocketRoom(state.room.code);
  state.room = null;
  state.rounds = [];
  state.totals = [];
  state.currentRound = null;
  saveSession();
  state.screen = 'lobby';
  render();
}

// ── Game actions ──
async function newRound() {
  const res = await api('/rooms/' + state.room.code + '/rounds', 'POST');
  if (res.error) { alert(res.error); return; }
}

async function increment(rid, uid) {
  await api('/rooms/' + state.room.code + '/scores/' + rid + '/' + uid + '/increment', 'POST');
}

async function decrement(rid, uid) {
  await api('/rooms/' + state.room.code + '/scores/' + rid + '/' + uid + '/decrement', 'POST');
}

function switchRound(id) {
  state.currentRound = state.rounds.find(r => r.id === id) || null;
  render();
}

function updateRoundTitle(rid, title) {
  if (state.currentRound && state.currentRound.id === rid) state.currentRound.title = title;
  const r = state.rounds.find(x => x.id === rid);
  if (r) r.title = title;
  clearTimeout(state.titleSaveTimer);
  state.titleSaveTimer = setTimeout(() =>
    api('/rooms/' + state.room.code + '/rounds/' + rid, 'PATCH', { title }), 500);
}

async function deleteRound(id) {
  if (!confirm('Deletar rodada?')) return;
  await api('/rooms/' + state.room.code + '/rounds/' + id, 'DELETE');
}

async function clearAll() {
  if (!confirm('Limpar TODAS as rodadas?')) return;
  for (const r of state.rounds) await api('/rooms/' + state.room.code + '/rounds/' + r.id, 'DELETE');
}

function isLeader() {
  return state.room && state.user && state.user.id === state.room.host_id;
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Timer ──
function startTimerCountdown() {
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(updateTimerDisplay, 100);
}

function clearTimerCountdown() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
}

function updateTimerDisplay() {
  if (!state.timer) { clearTimerCountdown(); return; }
  const remaining = Math.max(0, Math.ceil((state.timer.end_at_ms - Date.now()) / 1000));
  const pct = Math.max(0, (state.timer.end_at_ms - Date.now()) / (state.timer.duration * 1000) * 100);
  const cd = document.getElementById('timerCountdown');
  const bar = document.getElementById('timerBar');
  if (cd) {
    cd.textContent = remaining + 's';
    cd.className = 'timer-countdown' + (remaining <= 5 ? ' timer-urgent' : '');
  }
  if (bar) bar.style.width = pct + '%';
}

async function startTimer(roundId) {
  if (!state.room) return;
  const res = await api('/rooms/' + state.room.code + '/timer/start', 'POST', {
    round_id: roundId,
    duration: state.timerDuration
  });
  if (res.error) alert(res.error);
}

function handleAnswerInput(value) {
  state.myAnswer = value;
  if (!state._isTyping) {
    state._isTyping = true;
    emitTyping(true);
  }
  clearTimeout(state._typingStopTimer);
  state._typingStopTimer = setTimeout(() => {
    state._isTyping = false;
    emitTyping(false);
  }, 2000);
  clearTimeout(state.answerSaveTimer);
  state.answerSaveTimer = setTimeout(saveCurrentAnswer, 600);
}

function emitTyping(isTyping) {
  if (!state.socket || !state.timer || !state.room) return;
  state.socket.emit('typing_indicator', {
    code: state.room.code,
    session_id: state.timer.session_id,
    user_id: state.user.id,
    is_typing: isTyping
  });
}

async function saveCurrentAnswer() {
  if (!state.timer || !state.room) return;
  await api('/rooms/' + state.room.code + '/timer/answer', 'POST', {
    session_id: state.timer.session_id,
    text: state.myAnswer
  });
}

function applyTimerState(data) {
  const end_at_ms = data.started_at_ms + data.duration * 1000;
  if (end_at_ms <= Date.now()) return;
  state.timer = { session_id: data.session_id, duration: data.duration, round_id: data.round_id, end_at_ms };
  const r = state.rounds.find(x => x.id === data.round_id);
  if (r) state.currentRound = r;
  startTimerCountdown();
}

// ── YouTube ──
window.onYouTubeIframeAPIReady = function() {
  if (state.screen === 'game' && state.currentRound && state.currentRound.video_id) {
    syncVideoPlayer(state.currentRound);
  }
};

function extractYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{11}$/.test(url.trim())) return url.trim();
  return null;
}

function setRoundVideo(roundId) {
  const input = document.getElementById('videoUrlInput');
  if (!input) return;
  const vid = extractYouTubeId(input.value.trim());
  if (!vid) { alert('URL do YouTube inválida'); return; }
  if (!state.socket || !state.room) return;
  state.socket.emit('video_set', { code: state.room.code, round_id: roundId, video_id: vid });
}

function removeRoundVideo(roundId) {
  if (!confirm('Remover vídeo da rodada?')) return;
  if (state.ytPlayer) { try { state.ytPlayer.destroy(); } catch(e) {} state.ytPlayer = null; }
  state.currentVideoId = null;
  state._videoPlaying = false;
  clearVideoSync();
  if (!state.socket || !state.room) return;
  state.socket.emit('video_set', { code: state.room.code, round_id: roundId, video_id: '' });
}

function syncVideoPlayer(cr) {
  if (!cr) return;
  const videoId = cr.video_id || null;
  const container = document.getElementById('ytPlayerContainer');
  if (!container) {
    state._videoPlaying = false;
    state.currentVideoId = null;
    return;
  }
  if (!videoId) { state.currentVideoId = null; return; }
  if (!window.YT || !window.YT.Player) return;
  // If same video is already mounted, don't recreate
  if (videoId === state.currentVideoId && container.childElementCount > 0) return;
  // Destroy stale player reference
  if (state.ytPlayer) { try { state.ytPlayer.destroy(); } catch(e) {} state.ytPlayer = null; }
  state.currentVideoId = videoId;
  state.currentVideoRoundId = cr.id;
  container.innerHTML = '';
  const d = document.createElement('div');
  d.id = 'ytPlayerEl';
  container.appendChild(d);
  const vs = state.videoState[cr.id];
  let startSec = 0;
  if (vs) {
    startSec = vs.playing
      ? vs.position + (Date.now() - vs.position_at_ms) / 1000
      : vs.position;
    startSec = Math.max(0, Math.floor(startSec));
  }
  const leader = isLeader();
  state.ytPlayer = new YT.Player('ytPlayerEl', {
    height: '100%', width: '100%',
    videoId,
    playerVars: { controls: leader ? 1 : 0, playsinline: 1, rel: 0,
                  modestbranding: 1, disablekb: leader ? 0 : 1, fs: 1, iv_load_policy: 3, start: startSec },
    events: {
      onReady: e => { if (vs && vs.playing) e.target.playVideo(); },
      onStateChange: onYTStateChange
    }
  });
}

function onYTStateChange(event) {
  if (!isLeader() || state._suppressVideoEvents) return;
  const pos = state.ytPlayer ? state.ytPlayer.getCurrentTime() : 0;
  if (event.data === 1) {        // PLAYING
    state._videoPlaying = true;
    emitVideoControl('play', pos);
    startVideoSync();
  } else if (event.data === 2) { // PAUSED
    state._videoPlaying = false;
    emitVideoControl('pause', pos);
    clearVideoSync();
  } else if (event.data === 0) { // ENDED
    state._videoPlaying = false;
    emitVideoControl('pause', pos);
    clearVideoSync();
  }
}

function startVideoSync() {
  clearVideoSync();
  state._videoSyncInterval = setInterval(() => {
    if (isLeader() && state.ytPlayer && state._videoPlaying) {
      emitVideoControl('sync', state.ytPlayer.getCurrentTime());
    }
  }, 4000);
}

  clearInterval(state._videoSyncInterval);

  if (!state.socket || !state.room || !state.currentRound) return;

// ── Image helpers ──
function resizeImage(file, maxSize = 200) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = maxSize; canvas.height = maxSize;
        const ctx = canvas.getContext('2d');
        const size = Math.min(img.width, img.height);
        const sx = (img.width - size) / 2, sy = (img.height - size) / 2;
        ctx.drawImage(img, sx, sy, size, size, 0, 0, maxSize, maxSize);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function avatarHtml(color, avatar, name, size, cssClass = '') {
  const bg = color + '22';
  const initials = (name || '?').substring(0, 2).toUpperCase();
  const fontSize = Math.round(size / 3);
  if (avatar) {
    return `<div class="${cssClass}" style="width:${size}px;height:${size}px;border-color:${color};background:${bg}"><img src="${avatar}" alt="${name}"></div>`;
  }
  return `<div class="${cssClass}" style="width:${size}px;height:${size}px;border-color:${color};background:${bg};color:${color};font-size:${fontSize}px">${initials}</div>`;
}

// ── Applause + Confetti ──
function playApplause() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    function clap(time, freq, gain) {
      const len = Math.floor(ctx.sampleRate * 0.11);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq; f.Q.value = 1.2;
      const f2 = ctx.createBiquadFilter(); f2.type = 'highpass'; f2.frequency.value = 600;
      const g = ctx.createGain(); g.gain.setValueAtTime(gain, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
      src.connect(f); f.connect(f2); f2.connect(g); g.connect(ctx.destination);
      src.start(time); src.stop(time + 0.22);
    }
    [0,0.08,0.16,0.26,0.36,0.48,0.62,0.78,0.96,1.16,1.38,1.62].forEach(t => {
      clap(now+t, 1000+Math.random()*400, 0.5+Math.random()*0.4);
      clap(now+t+Math.random()*0.03, 1300+Math.random()*300, 0.3+Math.random()*0.3);
      clap(now+t+Math.random()*0.05, 800+Math.random()*300, 0.2+Math.random()*0.25);
    });
    setTimeout(() => ctx.close(), 2500);
  } catch(e) {}
}

function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#FF4500','#FF8C00','#FFD700','#00BFFF','#FF69B4','#7CFC00','#DA70D6','#FF1493','#00FFD0'];
  const particles = [];
  function spawn(n) {
    for (let i = 0; i < n; i++) {
      const circle = Math.random() > 0.5;
      particles.push({ x:Math.random()*canvas.width, y:-10-Math.random()*120, w:Math.random()*11+5, h:circle?Math.random()*11+5:Math.random()*6+3, color:colors[Math.floor(Math.random()*colors.length)], vx:(Math.random()-0.5)*5, vy:Math.random()*4+1.5, rot:Math.random()*360, rotV:(Math.random()-0.5)*9, op:1, circle });
    }
  }
  spawn(220); setTimeout(()=>spawn(80),400); setTimeout(()=>spawn(60),900);
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV; p.vy+=0.07; p.vx*=0.992;
      if (p.y > canvas.height*0.75) p.op -= 0.018;
      if (p.op<=0||p.y>canvas.height+20) { particles.splice(i,1); continue; }
      ctx.save(); ctx.globalAlpha=p.op; ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle=p.color;
      if (p.circle) { ctx.beginPath(); ctx.arc(0,0,p.w/2,0,Math.PI*2); ctx.fill(); } else { ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
      ctx.restore();
    }
    if (particles.length > 0) state.confettiFrame = requestAnimationFrame(animate);
    else { state.confettiFrame = null; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  if (state.confettiFrame) cancelAnimationFrame(state.confettiFrame);
  state.confettiFrame = requestAnimationFrame(animate);
}

function closePopup() {
  document.getElementById('winnerOverlay').classList.add('hidden');
  if (state.confettiFrame) { cancelAnimationFrame(state.confettiFrame); state.confettiFrame = null; }
  const canvas = document.getElementById('confettiCanvas');

}

function finalizarRodada() {
  const cr = state.currentRound;
  if (!cr) return;
  const scores = Object.entries(cr.scores || {});
  if (scores.length === 0) return;
  const ranking = scores.map(([uid, s]) => ({ uid, ...s })).sort((a, b) => b.points - a.points);
  const winner = ranking[0];
  const maxPts = Math.max(winner.points, 1);
  const wa = document.getElementById('winnerAvatar');
  if (winner.avatar) {
    wa.style.cssText = `border-color:${winner.color};background:${winner.color}22;box-shadow:0 0 30px ${winner.color}60;`;
    wa.innerHTML = `<img src="${winner.avatar}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    wa.style.cssText = `border-color:${winner.color};background:${winner.color}22;color:${winner.color};box-shadow:0 0 30px ${winner.color}60;font-family:'Orbitron';font-size:32px;font-weight:900;`;
    wa.innerHTML = (winner.name||'?').substring(0,2).toUpperCase();
  }
  document.getElementById('winnerName').textContent = winner.name;
  document.getElementById('winnerName').style.color = winner.color;
  document.getElementById('winnerScore').innerHTML = `pontos nesta rodada: <span style="color:${winner.color}">${winner.points}</span>`;
  const posLabels = ['1º','2º','3º'], posClasses = ['p1','p2','p3'], rankClasses = ['rank-1','rank-2','rank-3'];
  document.getElementById('rankingList').innerHTML = ranking.map((p, i) => {
    const posLabel = i < 3 ? posLabels[i] : `${i+1}º`;
    const posClass = i < 3 ? posClasses[i] : 'other';
    const rankClass = i < 3 ? rankClasses[i] : '';
    const barW = ((p.points/maxPts)*100).toFixed(1);
    const avInner = p.avatar
      ? `<div class="rank-avatar" style="border-color:${p.color};background:${p.color}22"><img src="${p.avatar}" alt="${p.name}"></div>`
      : `<div class="rank-avatar" style="border-color:${p.color};background:${p.color}22;color:${p.color}">${(p.name||'?').substring(0,2).toUpperCase()}</div>`;
    return `<div class="ranking-item ${rankClass}" style="animation-delay:${i*0.12+0.6}s">
      <div class="rank-pos ${posClass}">${posLabel}</div>${avInner}
      <div class="rank-info">
        <div class="rank-name" style="color:${p.color}">${p.name}</div>
        <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${barW}%;background:${p.color};transition:width 0.6s ease ${i*0.12+0.8}s"></div></div>
      </div>
      <div class="rank-score" style="color:${p.color}">${p.points}</div>
    </div>`;
  }).join('');
  document.getElementById('winnerOverlay').classList.remove('hidden');
  playApplause();
  launchConfetti();
}

function renderRoundScores(cr) {
  const entries = Object.values(cr.scores || {}).sort((a,b) => b.points - a.points);
  const max = Math.max(...entries.map(s => s.points), 1);
  return entries.map(s => `
    <div class="total-row">
      <div class="total-info">
        ${avatarHtml(s.color, s.avatar, s.name, 28, 'total-avatar')}
        <span class="total-name">${s.name}</span>
        <span class="total-value" style="color:${s.color}">${s.points}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${(s.points/max)*100}%;background:${s.color}"></div></div>
    </div>`).join('');
}

function renderScoreCards(cr) {
  const scores = cr.scores || {};
  const leader = isLeader();
  const timerActiveForRound = !!(state.timer && state.timer.round_id === cr.id);
  const roundAnswerMap = state.roundAnswers[cr.id] || null;
  return Object.entries(scores).map(([uid, s]) => {
    const hasScore = s.points > 0;
    const isTyping = timerActiveForRound && !!state.typingUsers[String(uid)];
    const answerText = roundAnswerMap ? (roundAnswerMap[String(uid)] ?? null) : null;
    const indicatorHtml = answerText !== null
      ? `<div class="card-indicator card-answer-display">${escHtml(answerText)}</div>`
      : timerActiveForRound
      ? `<div id="card-indicator-${uid}" class="card-indicator card-typing" style="display:${isTyping?'flex':'none'}">✏️ digitando...</div>`
      : '';
    const avInner = s.avatar
      ? `<div class="score-card-avatar" style="border-color:${s.color};background:${s.color}22"><img src="${s.avatar}" alt="${s.name}"></div>`
      : `<div class="score-card-avatar" style="border-color:${s.color};background:${s.color}22;color:${s.color}">${(s.name||'?').substring(0,2).toUpperCase()}</div>`;
    return `<div class="score-card" style="border-color:${s.color};box-shadow:${hasScore?`0 0 25px ${s.color}40`:'0 4px 15px rgba(0,0,0,0.3)'};background:${hasScore?`linear-gradient(145deg,${s.color}10,${s.color}22)`:'linear-gradient(145deg,#12122a,#181835)'}${leader?'':';cursor:default'}" ${leader?`onclick="increment(${cr.id},${uid})"`:''}>
      ${leader?`<div class="score-card-minus" onclick="event.stopPropagation();decrement(${cr.id},${uid})">−</div>`:''}
      ${indicatorHtml}
      ${avInner}
      <div class="score-card-name" style="color:${s.color}">${s.name}</div>
      <div class="score-card-points" style="color:${hasScore?'#fff':'rgba(255,255,255,0.2)'}">${s.points}</div>
      ${leader?`<div class="score-card-hint">toque = +1</div>`:''}
    </div>`;
  }).join('');
}

function renderPlacar() {
  const cr = state.currentRound;
  const roundSelector = state.rounds.length > 0 ? `
    <select class="round-select" onchange="switchRound(+this.value)">
      ${state.rounds.map(r => `<option value="${r.id}" ${cr&&cr.id===r.id?'selected':''}>RODADA ${r.number}</option>`).join('')}
    </select>` : '';

  if (!cr) return `
    <div class="current-round-header">
      <div>${roundSelector}</div>
      <button class="btn-new-round" onclick="newRound()">+ NOVA RODADA</button>
    </div>
    <div class="no-round"><div class="no-round-icon">🎮</div><div class="no-round-text">Nenhuma rodada ativa</div><div>Crie uma nova rodada para começar!</div></div>
    <div class="totals-section"><div class="totals-title">PONTUAÇÃO TOTAL</div>${renderTotals()}</div>`;

  const scores = cr.scores || {};
  const leader = isLeader();
  const timerActiveForRound = !!(state.timer && state.timer.round_id === cr.id);
  const roundAnswerMap = state.roundAnswers[cr.id] || null;
  const cards = renderScoreCards(cr);

  return `
    <div class="current-round-header">
      <div>${roundSelector}</div>
      <button class="btn-new-round" onclick="newRound()">+ NOVA RODADA</button>
    </div>
    <div class="round-title-row">
      <span class="field-label">TÍTULO DA RODADA</span>
      <input class="round-title-input" type="text" maxlength="60" placeholder="Ex: Rodada das perguntas difíceis..." value="${cr.title||''}" oninput="updateRoundTitle(${cr.id},this.value)">
    </div>
    ${renderVideoSection(cr)}
    <div id="timerSectionWrap">${renderTimerSection(cr)}</div>
    <div id="scoreGrid" class="score-grid">${cards}</div>
    <button class="btn-finalizar" onclick="finalizarRodada()">🏆 FINALIZAR RODADA</button>
    <div class="totals-section"><div class="totals-title">PONTUAÇÃO DA RODADA ${cr.number}</div>${renderRoundScores(cr)}</div>`;
}

function renderHistory() {
  if (state.rounds.length === 0) {
    return '<div class="empty"><div class="empty-icon">📋</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">Nenhuma rodada registrada</div><div>Vá ao placar e crie rodadas!</div></div>';
  }
  const summary = state.totals.map(t => {
    const av = t.avatar
      ? `<div class="summary-avatar" style="border-color:${t.color};background:${t.color}22"><img src="${t.avatar}"></div>`
      : `<div class="summary-avatar" style="border-color:${t.color};background:${t.color}22;color:${t.color}">${(t.name||'?').substring(0,2).toUpperCase()}</div>`;
    return `<div class="summary-item">${av}<span class="summary-name">${t.name}</span><span class="summary-value" style="color:${t.color}">${t.total}</span></div>`;
  }).join('');

  const cards = state.rounds.map(r => {
    const maxPts = Math.max(...Object.values(r.scores).map(s => s.points), 0);
    const chips = Object.entries(r.scores).map(([uid, s]) => {
      const isWinner = maxPts > 0 && s.points === maxPts;
      const chipAv = s.avatar
        ? `<div class="chip-avatar" style="border-color:${s.color};background:${s.color}22"><img src="${s.avatar}"></div>`
        : `<div class="chip-avatar" style="border-color:${s.color};background:${s.color}22;color:${s.color}">${(s.name||'?').substring(0,2).toUpperCase()}</div>`;
      return `<div class="round-chip" style="border-color:${s.points>0?s.color:'transparent'};background:${s.points>0?s.color+'20':'rgba(255,255,255,0.03)'}">
        ${isWinner?'<span class="chip-crown">👑</span>':''}${chipAv}
        <span class="chip-name" style="color:${s.points>0?s.color:'rgba(255,255,255,0.3)'}">${s.name}</span>
        <span class="chip-value" style="color:${s.points>0?'#fff':'rgba(255,255,255,0.15)'}">${s.points}</span>
      </div>`;
    }).join('');
    return `<div class="round-card">
      <div class="round-card-header">
        <span class="round-card-number">RODADA ${r.number}</span>
        <span class="round-card-time">${r.created_at}</span>
      </div>
      ${r.title?`<div class="round-card-title">${r.title}</div>`:''}
      <div class="round-card-scores">${chips}</div>
      <button class="btn-delete-round" onclick="deleteRound(${r.id})">✕</button>
    </div>`;
  }).join('');

  return `<div class="history-summary">${summary}</div><div class="rounds-list">${cards}</div><button class="btn-clear" onclick="clearAll()">🗑️ LIMPAR TUDO</button>`;
}

function renderGame() {
  const room = state.room;
  const tabs = [['placar','⚡ PLACAR'],['historico','📜 HISTÓRICO']];
  const tabsHtml = tabs.map(([t,l]) => `<button class="tab ${state.tab===t?'active':''}" onclick="state.tab='${t}';render()">${l}</button>`).join('');
  let content = state.tab === 'placar' ? renderPlacar() : renderHistory();

  return `<div class="app">
    <div class="game-header">
      <div class="game-header-top">
        <div class="room-info">
          <div class="room-name">${room.name}</div>
          <span class="room-code-badge" onclick="copyCode()" title="Clique para copiar">🔑 ${room.code}</span>
        </div>
        <div class="header-actions">
          <div class="round-count">${state.rounds.length} RODADA${state.rounds.length!==1?'S':''}</div>
          <button class="btn btn-ghost" style="padding:8px 12px;font-size:13px" onclick="openProfileModal()">👤</button>
          ${state.user?.role==='admin'?`<button class="btn btn-ghost" style="padding:8px 12px;font-size:13px" onclick="openAdminModal()">⚙</button>`:''}
          <button class="btn btn-ghost" style="padding:8px 12px;font-size:13px" onclick="leaveRoom()">✕</button>
        </div>
      </div>
      <div class="tabs">${tabsHtml}</div>
    </div>
    <div class="content">${content}</div>
  </div>`;
}

// ── Targeted timer/card update (avoids touching the video player) ──
function refreshTimerArea(cr) {
  const timerWrap = document.getElementById('timerSectionWrap');
  if (timerWrap) timerWrap.innerHTML = renderTimerSection(cr);
  const grid = document.getElementById('scoreGrid');
  if (grid) grid.innerHTML = renderScoreCards(cr);
}

// ── Main Render ──
function render() {
  // Preserve timer input focus/cursor across re-renders caused by score updates etc.
  const timerInput = document.getElementById('timerAnswerInput');
  const hadFocus = timerInput && document.activeElement === timerInput;
  const cursor = hadFocus ? { s: timerInput.selectionStart, e: timerInput.selectionEnd } : null;

  const app = document.getElementById('app');
  if (state.screen === 'login') app.innerHTML = renderLogin();
  else if (state.screen === 'lobby') app.innerHTML = renderLobby();
  else if (state.screen === 'game') app.innerHTML = renderGame();

  if (state.screen === 'game' && state.currentRound) {
    setTimeout(() => syncVideoPlayer(state.currentRound), 0);
  }

  if (state.timer) {
    updateTimerDisplay();
    if (hadFocus && cursor) {
      const ni = document.getElementById('timerAnswerInput');
      if (ni) { ni.focus(); ni.setSelectionRange(cursor.s, cursor.e); }
    }
  }
}

// ── Init ──
async function init() {
  const savedToken = localStorage.getItem('ms_token');
  const savedRoom = localStorage.getItem('ms_room');
  if (savedToken) {
    state.token = savedToken;
    const user = await api('/auth/me');
    if (user.error) { clearSession(); state.screen = 'login'; render(); return; }
    state.user = user;
    connectSocket();
    if (savedRoom) {
      const room = await api('/rooms/' + savedRoom);
      if (!room.error) {
        state.room = room;
        state.rounds = await api('/rooms/' + savedRoom + '/rounds');
        state.totals = await api('/rooms/' + savedRoom + '/totals');
        state.currentRound = state.rounds[0] || null;
        state.videoState = {};
        state.rounds.forEach(r => { if (r.video_state) state.videoState[r.id] = r.video_state; });
        const timerInfo = await api('/rooms/' + savedRoom + '/timer');
        if (timerInfo && timerInfo.active) applyTimerState(timerInfo);
        joinSocketRoom(savedRoom);
        state.screen = 'game';
      } else {
        state.screen = 'lobby';
      }
    } else {
      state.screen = 'lobby';
    }
  }
  render();
  if (state.timer) startTimerCountdown();
}

init();
</script>
