services:
  mongodb:
    image: mongo:7
    container_name: mobshow-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - mobshow

  backend:
    build: ./backend
    container_name: mobshow-api
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=mobshow
    networks:
      - mobshow

  frontend:
    build: ./frontend
    container_name: mobshow-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mobshow

volumes:
  mongo_data:

networks:
  mobshow:
