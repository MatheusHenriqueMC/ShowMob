services:
  mongodb:
    image: mongo:7
    container_name: mobshow-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - mobshow

  backend:
    build: ./backend
    container_name: mobshow-api
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    networks:
      - mobshow

  frontend:
    build: ./frontend
    container_name: mobshow-web
    restart: unless-stopped
    depends_on:
      - backend
    env_file: ./frontend/.env
    ports:
      - "3000:3000"
    networks:
      - mobshow

volumes:
  mongo_data:

networks:
  mobshow:
